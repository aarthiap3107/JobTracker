# MySQL Connection
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/job_tracker}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root123}

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Server
server.port=${PORT:8080}

# JWT
jwt.secret=${JWT_SECRET:jobtracker_super_secret_key_2024_abcdefgh}
jwt.expiration=86400000

# Gemini
gemini.api-key=${GEMINI_API_KEY}

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false

# Mail
spring.mail.host=${MAIL_HOST:sandbox.smtp.mailtrap.io}
spring.mail.port=${MAIL_PORT:2525}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Multipart
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
